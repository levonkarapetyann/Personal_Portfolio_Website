<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% block stylesheet %}{% endblock %}
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socketio/4.0.1/socketio.js"></script>
    <title>{% block title %}{% endblock %}</title>
</head>
<body>
{% block body %}{% endblock %}
{% block script %}{% endblock %}
<div id="custom-chat-widget">
    <div id="chat-window" class="chat-window hidden">
    <div class="chat-header">
        <div class="user-info">
            <div class="status-dot"></div>
           <span>Assistant Levon</span>
        </div>
        <button id="close-chat">&times;</button>
    </div>
    <div id="pre-chat-form" class="chat-auth-form">
        <p class="auth-instruction">Welcome! Please introduce yourself to start the chat.</p>
        <div class="input-group">
            <input type="text" id="auth-name" placeholder="Your Name" required autocomplete="off">
        </div>
        <div class="input-group">
            <input type="email" id="auth-email" placeholder="Your Email" required autocomplete="off">
        </div>
        <button id="start-chat-btn" class="start-chat-btn">Start Chat</button>
    </div>
    <div id="chat-area">
        <div class="chat-messages" id="chat-messages">
            <div class="msg bot">
                Hi! How can I help you today?
            </div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="user-msg" name="user_message" placeholder="Write a message..." autocomplete="off">
            <button id="mic-btn" title="Voice message">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
            </button>
            <button id="send-msg">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
    </div>  
    <div class="chat-footer">Powered by Levon</div>
</div>

    <button id="chat-trigger" class="chat-trigger">
        <svg viewBox="0 0 24 24" width="30" height="30" fill="white"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"></path></svg>
    </button>
</div>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    if (typeof io === 'undefined') {
        console.error("Критическая ошибка: Библиотека Socket.IO не загружена!");
        return; 
    }
    const socket = io();
    
    const chatWindow = document.getElementById('chat-window');
    const chatTrigger = document.getElementById('chat-trigger');
    const closeChat = document.getElementById('close-chat');
    const preChatForm = document.getElementById('pre-chat-form');
    const chatArea = document.getElementById('chat-area');
    
    const authNameInput = document.getElementById('auth-name');
    const authEmailInput = document.getElementById('auth-email');
    const startChatBtn = document.getElementById('start-chat-btn');
    
    const sendBtn = document.getElementById('send-msg');
    const input = document.getElementById('user-msg');
    const messagesBox = document.getElementById('chat-messages');

    let userName = "";
    let userEmail = "";
    let emailSent = false;

    const SESSION_TTL = 30 * 60 * 1000;
    const saved = JSON.parse(sessionStorage.getItem('chat_user') || 'null');
    if (saved && (Date.now() - saved.ts) < SESSION_TTL) {
        userName = saved.name;
        userEmail = saved.email;
        preChatForm.style.display = 'none';
        chatArea.style.display = 'flex';
        socket.emit('register_session', { user_name: userName, user_email: userEmail });
        input.focus();
    }

    startChatBtn.addEventListener('click', () => {
        const name = authNameInput.value.trim();
        const email = authEmailInput.value.trim();

        if (!name || !email) { alert("Please fill in all fields."); return; }
        if (!email.includes('@')) { alert("Please enter a valid email address."); return; }

        userName = name;
        userEmail = email;
        sessionStorage.setItem('chat_user', JSON.stringify({ name, email, ts: Date.now() }));

        preChatForm.style.display = 'none';
        chatArea.style.display = 'flex';
        socket.emit('register_session', { user_name: userName, user_email: userEmail });
        input.focus();
    });

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `msg ${sender}`;
        div.textContent = text;
        messagesBox.appendChild(div);
        messagesBox.scrollTop = messagesBox.scrollHeight;
        return div;
    }

    function addAudioMessage(audioB64, sender) {
        const div = document.createElement('div');
        div.className = `msg ${sender} audio-msg`;

        const audioBlob = new Blob(
            [Uint8Array.from(atob(audioB64), c => c.charCodeAt(0))],
            { type: 'audio/mpeg' }
        );
        const audioUrl = URL.createObjectURL(audioBlob);
        const audio = new Audio(audioUrl);

        const playBtn = document.createElement('button');
        playBtn.className = 'audio-play-btn';
        playBtn.innerHTML = '▶';

        const wave = document.createElement('div');
        wave.className = 'audio-wave';
        for (let i = 0; i < 28; i++) {
            const bar = document.createElement('span');
            bar.style.height = Math.random() * 14 + 4 + 'px';
            wave.appendChild(bar);
        }

        const timer = document.createElement('span');
        timer.className = 'audio-timer';
        timer.textContent = '0:00';

        audio.addEventListener('loadedmetadata', () => {
            const dur = Math.round(audio.duration);
            timer.textContent = `0:${dur < 10 ? '0' + dur : dur}`;
        });

        let interval;
        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playBtn.innerHTML = '⏸';
                wave.classList.add('playing');
                interval = setInterval(() => {
                    const t = Math.round(audio.currentTime);
                    timer.textContent = `0:${t < 10 ? '0' + t : t}`;
                }, 500);
            } else {
                audio.pause();
                playBtn.innerHTML = '▶';
                wave.classList.remove('playing');
                clearInterval(interval);
            }
        });

        audio.addEventListener('ended', () => {
            playBtn.innerHTML = '▶';
            wave.classList.remove('playing');
            clearInterval(interval);
            timer.textContent = '0:00';
        });

        div.appendChild(playBtn);
        div.appendChild(wave);
        div.appendChild(timer);
        messagesBox.appendChild(div);
        messagesBox.scrollTop = messagesBox.scrollHeight;
    }

    socket.on('user_receive', (data) => {
        addMessage(data.message, 'bot');
    });

    socket.on('lsmg', (history) => {
        messagesBox.innerHTML = '<div class="msg bot">Hi! How can I help you today?</div>';
        
        history.forEach(m => {
            if (m.username === userName) {
                if (m.sender_type === 'user') {
                    addMessage(m.message, 'user');
                    emailSent = true; 
                } else if (m.sender_type === 'admin') {
                    addMessage(m.message, 'bot');
                }
            }
        });
    });

    async function sendMessage() {
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        input.value = '';

        socket.emit('user_msg', {
           user_name: userName,
           user_email: userEmail,
           message: text
        });

        try {
            const res = await fetch('/ai_chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text, user_name: userName, user_email: userEmail })
            });
            const data = await res.json();
            if (data.reply) {
                addMessage(data.reply, 'bot');
            }
        } catch(e) {
            console.error('AI error:', e);
        }

        emailSent = true;
    }

    const micBtn = document.getElementById('mic-btn');
    let mediaRecorder = null;
    let audioChunks = [];
    let isRecording = false;

    micBtn.addEventListener('click', async () => {
        if (isRecording) {
            mediaRecorder.stop();
            return;
        }
        let stream;
        try {
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        } catch (err) {
            addMessage('⚠️ Microphone access denied. Please allow microphone in browser settings.', 'bot');
            return;
        }
        audioChunks = [];
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
        mediaRecorder.onstop = async () => {
            isRecording = false;
            micBtn.classList.remove('recording');
            micBtn.title = 'Voice message';
            stream.getTracks().forEach(t => t.stop());

            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            addMessage('🎤 Processing voice...', 'user');

            const formData = new FormData();
            formData.append('audio', audioBlob, 'voice.webm');
            formData.append('user_name', userName);
            formData.append('user_email', userEmail);

            try {
                const res = await fetch('/voice_chat', { method: 'POST', body: formData });
                const data = await res.json();
                const msgs = messagesBox.querySelectorAll('.msg.user');
                const last = msgs[msgs.length - 1];
                if (last && last.textContent === '🎤 Processing voice...') {
                    last.textContent = `🎤 ${data.transcript || 'Voice message'}`;
                }
                if (data.transcript) {
                    socket.emit('user_msg', { user_name: userName, user_email: userEmail, message: `🎤 ${data.transcript}` });
                }
                if (data.audio_b64) {
                    addAudioMessage(data.audio_b64, 'bot');
                } else if (data.reply) {
                    addMessage(data.reply, 'bot');
                }
            } catch (e) {
                addMessage('⚠️ Could not process voice. Please try typing instead.', 'bot');
            }
        };
        mediaRecorder.start();
        isRecording = true;
        micBtn.classList.add('recording');
        micBtn.title = 'Recording... click to stop';
    });

    input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            sendMessage();
        }
    });
    sendBtn.onclick = sendMessage;

    chatTrigger.onclick = () => chatWindow.classList.toggle('hidden');
    closeChat.onclick = () => chatWindow.classList.add('hidden');
});
</script>
<script>
document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', function() {
        const currentActive = document.querySelector('.nav-link.active');
        if (currentActive) {
            currentActive.classList.remove('active');
        }

        this.classList.add('active');
    });
});
</script>
</body>
</html>
