<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    {% block stylesheet %}{% endblock %}
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socketio/4.0.1/socketio.js"></script>
    <title>{% block title %}{% endblock %}</title>
</head>
<body>
{% block body %}{% endblock %}
{% block script %}{% endblock %}
<div id="custom-chat-widget">
    <div id="chat-window" class="chat-window hidden">
    <div class="chat-header">
        <div class="user-info">
            <div class="status-dot"></div>
           <span>Assistant Levon</span>
        </div>
        <button id="close-chat">&times;</button>
    </div>
    <div id="pre-chat-form" class="chat-auth-form">
        <p class="auth-instruction">Welcome! Please introduce yourself to start the chat.</p>
        <div class="input-group">
            <input type="text" id="auth-name" placeholder="Your Name" required autocomplete="off">
        </div>
        <div class="input-group">
            <input type="email" id="auth-email" placeholder="Your Email" required autocomplete="off">
        </div>
        <button id="start-chat-btn" class="start-chat-btn">Start Chat</button>
    </div>
    <div id="chat-area" style="display: none; flex-direction: column; flex-grow: 1; overflow: hidden;">
        <div class="chat-messages" id="chat-messages">
            <div class="msg bot">
                Hi! How can I help you today?
            </div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="user-msg" name="user_message" placeholder="Write a message..." autocomplete="off">
            <button id="send-msg">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
    </div>  
    <div class="chat-footer">Powered by Levon</div>
</div>

    <button id="chat-trigger" class="chat-trigger">
        <svg viewBox="0 0 24 24" width="30" height="30" fill="white"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"></path></svg>
    </button>
</div>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
    if (typeof io === 'undefined') {
        console.error("Критическая ошибка: Библиотека Socket.IO не загружена!");
        return; 
    }
    const socket = io();
    
    const chatWindow = document.getElementById('chat-window');
    const chatTrigger = document.getElementById('chat-trigger');
    const closeChat = document.getElementById('close-chat');
    const preChatForm = document.getElementById('pre-chat-form');
    const chatArea = document.getElementById('chat-area');
    
    const authNameInput = document.getElementById('auth-name');
    const authEmailInput = document.getElementById('auth-email');
    const startChatBtn = document.getElementById('start-chat-btn');
    
    const sendBtn = document.getElementById('send-msg');
    const input = document.getElementById('user-msg');
    const messagesBox = document.getElementById('chat-messages');

    let userName = "";
    let userEmail = "";
    let emailSent = false;

    startChatBtn.addEventListener('click', () => {
        const name = authNameInput.value.trim();
        const email = authEmailInput.value.trim();

        if (!name || !email) {
            alert("Please fill in all fields.");
            return;
        }

        if (!email.includes('@')) {
            alert("Please enter a valid email address.");
            return;
        }

        userName = name;
        userEmail = email;

        preChatForm.style.display = 'none';
        chatArea.style.display = 'flex';
        
        // Триггерим переподключение или отправку сообщения на бэкенд, 
        // чтобы сервер зафиксировал сессию, и принудительно запрашиваем историю
        socket.emit('user_msg', { user_name: userName, user_email: userEmail, message: "👋 Вошёл в чат" });
        
        input.focus();
    });

    function addMessage(text, sender) {
        const div = document.createElement('div');
        div.className = `msg ${sender}`;
        div.textContent = text;
        messagesBox.appendChild(div);
        messagesBox.scrollTop = messagesBox.scrollHeight;
    }

    socket.on('user_receive', (data) => {
        addMessage(data.message, 'bot');
    });

    socket.on('lsmg', (history) => {
        messagesBox.innerHTML = '<div class="msg bot">Hi! How can I help you today?</div>';
        
        history.forEach(m => {
            // Загружаем сообщения только этого конкретного пользователя
            if (m.username === userName) {
                if (m.sender_type === 'user') {
                    addMessage(m.message, 'user');
                    emailSent = true; // Если он уже писал, не шлем повторный alert
                } else if (m.sender_type === 'admin') {
                    addMessage(m.message, 'bot');
                }
            }
        });
    });

    function sendMessage() {
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        input.value = '';

        socket.emit('user_msg', {
           user_name: userName,
           user_email: userEmail,
           message: text
        });
        
        if (!emailSent) {
            addMessage("Thank you! Your message has been sent. I'll contact you soon!", "bot");
            emailSent = true;
        }
    }

    input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            sendMessage();
        }
    });
    sendBtn.onclick = sendMessage;

    chatTrigger.onclick = () => chatWindow.classList.toggle('hidden');
    closeChat.onclick = () => chatWindow.classList.add('hidden');
});
</script>
<script>
document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', function() {
        const currentActive = document.querySelector('.nav-link.active');
        if (currentActive) {
            currentActive.classList.remove('active');
        }

        this.classList.add('active');
    });
});
</script>
</body>
</html>
